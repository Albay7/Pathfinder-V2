databases:
  - name: pathfinder-db
    plan: free
    databaseName: pathfinder
    user: pathfinder

services:
  - type: web
    name: pathfinder
    plan: free
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: APP_NAME
        value: Pathfinder
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_KEY
        generateValue: true
      - key: APP_URL
        fromService:
          name: pathfinder
          type: web
          property: host
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: pathfinder-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: pathfinder-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: pathfinder-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: pathfinder-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: pathfinder-db
          property: password
      - key: SESSION_DRIVER
        value: database
      - key: CACHE_STORE
        value: database
      - key: QUEUE_CONNECTION
        value: sync
      - key: LOG_CHANNEL
        value: stack
      - key: LOG_LEVEL
        value: error
