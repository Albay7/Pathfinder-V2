name: Deploy to Azure

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**.md'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - prod
      deploy_infra:
        description: 'Whether to deploy infrastructure (Bicep)'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      location:
        description: 'Location to deploy infra (used for Bicep)'
        required: false
        default: 'westeurope'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'dev' }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, dom, fileinfo, mysql
          coverage: none

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Prepare app working dir
        run: |
          cp Pathfinder/.env.example Pathfinder/.env || true
        shell: bash

      - name: Install Composer dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction
        working-directory: Pathfinder

      - name: Install NPM dependencies
        run: npm ci
        working-directory: Pathfinder

      - name: Build assets
        run: npm run build
        working-directory: Pathfinder

      - name: Generate application key
        run: php artisan key:generate --force
        working-directory: Pathfinder

      - name: Configure storage directory
        run: |
          mkdir -p Pathfinder/storage/app/public
          mkdir -p Pathfinder/storage/framework/cache
          mkdir -p Pathfinder/storage/framework/sessions
          mkdir -p Pathfinder/storage/framework/views
          chmod -R 777 Pathfinder/storage
          chmod -R 777 Pathfinder/bootstrap/cache

      - name: Create deployment package
        run: |
          cd Pathfinder
          tar -czf ../app.tar.gz . --exclude=node_modules --exclude=tests --exclude=.git --exclude=.github

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy infrastructure (Bicep)
        if: ${{ github.event.inputs.deploy_infra == 'true' }}
        uses: azure/cli@v1
        with:
          inlineScript: |
            echo "Deploying Bicep template..."
            az deployment sub create --location ${{ github.event.inputs.location || 'westeurope' }} --template-file Pathfinder/infra/main.bicep --parameters prefix='pathfinder' environment='${{ github.event.inputs.environment || 'dev' }}' mysqlAdminPassword='${{ secrets.MYSQL_ADMIN_PASSWORD }}'

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          package: app.tar.gz

      - name: Run database migrations
        uses: azure/cli@v1
        with:
          inlineScript: |
            az webapp ssh --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} --name ${{ secrets.AZURE_WEBAPP_NAME }} --command "cd /home/site/wwwroot && php artisan migrate --force"