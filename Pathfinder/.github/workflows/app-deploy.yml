name: App Build & Deploy

on:
  push:
    branches:
      - main
    paths-ignore:
      - "infra/**"
      - "ml/**"
      - ".github/workflows/infra-deploy.yml"
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy (dev|prod)"
        required: true
        default: "prod"

permissions:
  id-token: write
  contents: read

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    env:
      PHP_VERSION: "8.2"
      NODE_VERSION: "18"
      APP_DIR: Pathfinder
      PREFIX: pathfinder
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mbstring, pdo_mysql, intl, bcmath, xml, ctype, json, tokenizer
          coverage: none

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache/files
          key: composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            composer-

      - name: Install Composer Dependencies
        working-directory: ${{ env.APP_DIR }}
        run: composer install --no-interaction --prefer-dist --no-progress --optimize-autoloader

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: ${{ env.APP_DIR }}/package-lock.json

      - name: Install Node Dependencies
        working-directory: ${{ env.APP_DIR }}
        run: npm ci

      - name: Build Assets
        working-directory: ${{ env.APP_DIR }}
        run: |
          if [ -f package.json ]; then npm run build || npm run prod || echo "No build script"; fi

      - name: Prepare App Artifacts
        working-directory: ${{ env.APP_DIR }}
        run: |
          cp .env.example .env || true
          php artisan config:clear || true
          php artisan cache:clear || true
          php artisan config:cache || true
          php artisan route:cache || true
          php artisan view:cache || true
          tar -czf app.tar.gz .

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Determine App Name
        id: appname
        run: |
          ENV="${{ github.event.inputs.environment || 'prod' }}"
          if [ "$ENV" = "dev" ]; then WEBAPP="app-${{ env.PREFIX }}-dev"; else WEBAPP="app-${{ env.PREFIX }}-prod"; fi
          echo "webapp=$WEBAPP" >> $GITHUB_OUTPUT
          echo "Deploying to $WEBAPP"

      - name: Deploy to Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ steps.appname.outputs.webapp }}
          package: ${{ env.APP_DIR }}/app.tar.gz

      - name: Post Deployment Smoke Test
        run: |
          curl -I https://${{ steps.appname.outputs.webapp }}.azurewebsites.net || true
