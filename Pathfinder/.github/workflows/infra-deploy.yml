name: Infra Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy (dev|prod)"
        required: true
        default: "dev"
  push:
    paths:
      - "infra/**"
    branches:
      - main

permissions:
  id-token: write
  contents: read

env:
  AZURE_LOCATION: southeastasia
  PREFIX: pathfinder

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set environment
        id: envsel
        run: echo "ENVIRONMENT=${{ github.event.inputs.environment || 'dev' }}" >> $GITHUB_OUTPUT

      - name: Ensure Resource Group
        uses: azure/cli@v2
        with:
          inlineScript: |
            RG_NAME="${PREFIX}-rg-${{ steps.envsel.outputs.ENVIRONMENT }}"
            echo "Using resource group: $RG_NAME"
            az group create -n "$RG_NAME" -l "$AZURE_LOCATION"
            echo "RG_NAME=$RG_NAME" >> $GITHUB_OUTPUT

      - name: Validate Bicep (group scope what-if)
        uses: azure/cli@v2
        with:
          inlineScript: |
            az bicep version
            az deployment group what-if \
              --resource-group ${{ steps.envsel.outputs.RG_NAME || env.PREFIX }}-rg-${{ steps.envsel.outputs.ENVIRONMENT }} \
              --template-file infra/main.bicep \
              --parameters @infra/parameters/${{ steps.envsel.outputs.ENVIRONMENT }}.json mysqlAdminPassword=${{ secrets.MYSQL_ADMIN_PASSWORD }}

      - name: Deploy Infra (group scope)
        uses: azure/cli@v2
        with:
          inlineScript: |
            RG_NAME="${PREFIX}-rg-${{ steps.envsel.outputs.ENVIRONMENT }}"
            if [ -z "${{ secrets.MYSQL_ADMIN_PASSWORD }}" ]; then echo "MYSQL_ADMIN_PASSWORD secret not set" && exit 1; fi
            az deployment group create \
              --resource-group "$RG_NAME" \
              --template-file infra/main.bicep \
              --parameters @infra/parameters/${{ steps.envsel.outputs.ENVIRONMENT }}.json mysqlAdminPassword=${{ secrets.MYSQL_ADMIN_PASSWORD }} \
              --name pathfinder-${{ steps.envsel.outputs.ENVIRONMENT }}-${{ github.run_id }}

      - name: Output Summary
        uses: azure/cli@v2
        with:
          inlineScript: |
            echo "Deployment complete for ${{ steps.envsel.outputs.ENVIRONMENT }}"
