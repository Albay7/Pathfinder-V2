name: App Build & Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      APP_NAME: ${{ secrets.AZURE_WEBAPP_NAME }}
      RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: dom, curl, mbstring, zip, pdo, mysql, gd, bcmath
          coverage: none

      - name: Composer install (prod)
        run: |
          composer install --no-dev --prefer-dist --no-interaction --no-progress
          php artisan key:generate --ansi || true
          php artisan config:clear || true

      - name: Node install & build
        run: |
          npm ci || npm install
          npm run build || npm run prod || echo "No build script"

      - name: Archive app for deploy
        run: |
          mkdir -p build
          tar -czf build/app.tar.gz --exclude=.git --exclude=build .

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Azure context info
        run: |
          az account show --output table
          az group show -n "$RESOURCE_GROUP" --output table || true

      - name: Provision Azure resources if missing
        env:
          LOCATION: ${{ secrets.AZURE_LOCATION }}
        run: |
          set -e
          if [ -z "$APP_NAME" ] || [ -z "$RESOURCE_GROUP" ]; then
            echo "Missing required secrets: AZURE_WEBAPP_NAME or AZURE_RESOURCE_GROUP";
            exit 1;
          fi
          LOCATION="${LOCATION:-eastus}"
          echo "Ensuring resource group $RESOURCE_GROUP exists in $LOCATION"
          if ! az group show -n "$RESOURCE_GROUP" >/dev/null 2>&1; then
            az group create -n "$RESOURCE_GROUP" -l "$LOCATION"
          fi

          PLAN_NAME="${APP_NAME}-plan"
          echo "Ensuring App Service plan $PLAN_NAME exists (Linux B1)"
          if ! az appservice plan show -n "$PLAN_NAME" -g "$RESOURCE_GROUP" >/dev/null 2>&1; then
            az appservice plan create -n "$PLAN_NAME" -g "$RESOURCE_GROUP" --sku B1 --is-linux
          fi

          echo "Ensuring Web App $APP_NAME exists"
          if ! az webapp show -n "$APP_NAME" -g "$RESOURCE_GROUP" >/dev/null 2>&1; then
            az webapp create -n "$APP_NAME" -g "$RESOURCE_GROUP" --plan "$PLAN_NAME" --runtime "PHP|8.2"
          fi

          echo "Configuring Web App runtime and settings"
          az webapp config set -g "$RESOURCE_GROUP" -n "$APP_NAME" --linux-fx-version "PHP|8.2" --always-on true
          az webapp update -g "$RESOURCE_GROUP" -n "$APP_NAME" --set httpsOnly=true
          az webapp config appsettings set -g "$RESOURCE_GROUP" -n "$APP_NAME" --settings WEBSITE_RUN_FROM_PACKAGE=1 SCM_DO_BUILD_DURING_DEPLOYMENT=false

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          package: build/app.tar.gz

      - name: Smoke test
        run: |
          echo "Hit health endpoint";
          curl -I "https://${{ secrets.AZURE_WEBAPP_NAME }}.azurewebsites.net/simple-health.php" || true